version: '3.8'

services:
  # --- Redis ---
  redis-server:
    image: redis:latest
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 你的密码
    volumes:
      - "E:/Code/docker/redis/data:/data"
    networks:
      - app-network

  # --- MongoDB ---
  mongodb-xcz:
    image: mongo:latest
    container_name: mongodb-xcz
    restart: always
    ports:
      - "27017:27017"
    environment:
      # 设置初始 root 用户名
      - MONGO_INITDB_ROOT_USERNAME=admin
      # 设置初始 root 密码
      - MONGO_INITDB_ROOT_PASSWORD=你的密码
    volumes:
      - "E:/Code/docker/mongo/db:/data/db"
    networks:
      - app-network

  # --- Elasticsearch ---
  es:
    image: elasticsearch:9.2.2
    container_name: es
    restart: always
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - "E:/Code/docker/es/data:/usr/share/elasticsearch/data"
    networks:
      - app-network

  # --- Nacos ---
  nacos:
    image: nacos/nacos-server:latest
    container_name: nacos
    restart: always
    ports:
      - "18080:8080"
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - SPRING_DATASOURCE_PLATFORM=mysql
      # ！！！注意：这里指向宿主机 IP
      - MYSQL_SERVICE_HOST=host.docker.internal
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=nacos_config
      - MYSQL_SERVICE_PASSWORD=你的密码
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_TOKEN=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY=
      - NACOS_AUTH_IDENTITY_KEY=nacos
      - NACOS_AUTH_IDENTITY_VALUE=你的密码
      # 限制内存占用
      - JVM_XMS=512m
      - JVM_XMX=512m
    volumes:
      - "/www/wwwroot/docker/nacos/conf:/home/nacos/conf"
      - "/www/wwwroot/docker/nacos/logs:/home/nacos/logs"
      - "/www/wwwroot/docker/nacos/data:/home/nacos/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  # --- RocketMQ NameServer ---
  rmqnamesrv:
    image: apache/rocketmq:5.3.0
    container_name: rmqnamesrv
    restart: always
    ports:
      - "9876:9876"
    volumes:
      - "E:/Code/docker/rocketmq/namesrv/logs:/home/rocketmq/logs"
    command: sh mqnamesrv
    networks:
      - app-network

  # --- RocketMQ Broker ---
  rmqbroker:
    image: apache/rocketmq:5.3.0
    container_name: rmqbroker
    restart: always
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
    volumes:
      - "E:/Code/docker/rocketmq/broker/logs:/home/rocketmq/logs"
      - "E:/Code/docker/rocketmq/broker/store:/home/rocketmq/store"
      # 如果你有自定义broker.conf，可以取消下面注释
      # - "E:/Code/docker/rocketmq/broker/conf/broker.conf:/home/rocketmq/conf/broker.conf"
    command: sh mqbroker -n rmqnamesrv:9876
    depends_on:
      - rmqnamesrv
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
